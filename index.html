<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Меню</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#121212">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Меню">

<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="apple-touch-icon.png">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="app">

    <div class="back" onclick="goBack()">
        ← Назад
    </div>

    <!-- ========================= -->
    <!-- Участник                  -->
    <!-- ========================= -->

    <div id="participantBar">

        <div class="participantTitle">
            Участник
        </div>

        <div class="row">

            <input
                id="participantInput"
                placeholder="Введите имя">

            <button
                id="participantBtn"
                onclick="applyParticipant()">
                Внести
            </button>

        </div>

    </div>

    <!-- ========================= -->
    <!-- Меню                      -->
    <!-- ========================= -->

    <h2 id="title"></h2>

    <div
        id="list"
        class="list-container">
    </div>

    <!-- ========================= -->
    <!-- Кнопки                    -->
    <!-- ========================= -->

    <button
        class="main"
        onclick="generateReceipt()">
        Сгенерировать чек
    </button>

    <!-- ========================= -->
    <!-- Смещение времени          -->
    <!-- ========================= -->

    <div id="timeBar">

        <span class="clockIcon">
            🕒
        </span>

        <select id="timeOffsetSelect">

            <option value="0">0 мин</option>

            <option value="-5">−5</option>

            <option value="-10">−10</option>

            <option value="-15">−15</option>

            <option value="-20">−20</option>

            <option value="-25">−25</option>

            <option value="-30">−30</option>

            <option value="-40">−40</option>

            <option value="-50">−50</option>

            <option value="-60">−60</option>

        </select>

    </div>

    <button
        id="resetBtn"
        class="main"
        onclick="resetPage()">
        Сброс
    </button>

    <!-- ========================= -->
    <!-- Превью                    -->
    <!-- ========================= -->

    <div id="preview"></div>

    <canvas id="canvas"></canvas>

</div>

<script src="app.js"></script>

<script>

if ("serviceWorker" in navigator) {

    window.addEventListener("load", async () => {

        try {

            const registration =
                await navigator.serviceWorker.register(
                    "/Menubeta.github.io/sw.js"
                );

            registration.addEventListener("updatefound", () => {

                const worker = registration.installing;

                if (!worker) return;

                worker.addEventListener("statechange", () => {

                    if (
                        worker.state === "installed" &&
                        navigator.serviceWorker.controller
                    ) {

                        if (confirm("Доступна новая версия приложения. Обновить сейчас?")) {

                            window.location.reload();

                        }

                    }

                });

            });

            setInterval(() => {

                registration.update();

            }, 60000);

        }

        catch (e) {

            console.error(e);

        }

    });

}

</script>

</body>
</html>
